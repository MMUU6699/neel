<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Index TV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Redirect to the production URL, passing a query parameter to enable TV mode if needed -->
    <meta http-equiv="refresh" content="0;url=https://REPLACE_WITH_YOUR_DOMAIN.com?tv=true">
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // Fallback JavaScript redirect
        setTimeout(function() {
            window.location.replace("https://REPLACE_WITH_YOUR_DOMAIN.com?tv=true");
        }, 1000);

        // Listen for webOS back key during loading just in case
        document.addEventListener('keydown', function(inEvent) {
            var keycode;
            if(window.event) {
                keycode = inEvent.keyCode;
            } else if(inEvent.which) {
                keycode = inEvent.which;
            }
            if (keycode === 461) {
                if (typeof webOS !== 'undefined' && webOS.platformBack) {
                    webOS.platformBack();
                } else {
                    window.close();
                }
            }
        });
    </script>
</body>
</html>

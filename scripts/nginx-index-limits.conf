# Loaded from /etc/nginx/conf.d inside nginx's http context.
map $http_upgrade $index_connection_upgrade {
    default upgrade;
    '' close;
}

limit_req_zone $binary_remote_addr zone=index_general:20m rate=20r/s;
limit_req_zone $binary_remote_addr zone=index_health:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=index_stream:20m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=index_per_ip:20m;
limit_conn_zone $server_name zone=index_server:1m;

proxy_cache_path /var/cache/nginx/index
    levels=1:2
    keys_zone=index_static:50m
    max_size=2g
    inactive=7d
    use_temp_path=off;

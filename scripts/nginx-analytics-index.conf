# ── analytics.REPLACE_WITH_YOUR_DOMAIN.com HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name analytics.REPLACE_WITH_YOUR_DOMAIN.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── analytics.REPLACE_WITH_YOUR_DOMAIN.com HTTPS (Umami) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name analytics.REPLACE_WITH_YOUR_DOMAIN.com;

    ssl_certificate /etc/letsencrypt/live/analytics.REPLACE_WITH_YOUR_DOMAIN.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.REPLACE_WITH_YOUR_DOMAIN.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
